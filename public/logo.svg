<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Magnifying glass body -->
  <circle cx="14" cy="14" r="9.5" stroke="url(#grad)" stroke-width="2.5" fill="none"/>
  <!-- Handle -->
  <line x1="21.2" y1="21.2" x2="28.5" y2="28.5" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Target/crosshair inside -->
  <circle cx="14" cy="14" r="4" stroke="url(#grad)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="14" cy="14" r="1.2" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="4" y1="4" x2="28" y2="28">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
</svg>
